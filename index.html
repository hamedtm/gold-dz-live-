<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLD DZ LIVE - الاحترافي</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* المتغيرات للوضع المضيء (الأساسي) */
        :root {
            --gold: #b8860b;
            --dark-gold: #8b6508;
            --bg: #f4f4f4;
            --card: #ffffff;
            --text: #333333;
            --header-bg: linear-gradient(145deg, #ffffff, #e6e6e6);
            --up: #008844;
            --down: #cc0000;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* المتغيرات للوضع الليلي */
        [data-theme="dark"] {
            --gold: #ffd700;
            --dark-gold: #b8860b;
            --bg: #0a0a0a;
            --card: #161616;
            --text: #ffffff;
            --header-bg: linear-gradient(145deg, #1a1a1a, #000);
            --up: #00ff88;
            --down: #ff4444;
            --shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 10px; 
            text-align: center; 
            transition: 0.3s;
        }
        
        /* زر تبديل الوضع */
        .theme-switch {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1000;
            background: var(--card);
            border: 1px solid var(--gold);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: var(--shadow);
            color: var(--gold);
        }

        .header { 
            background: var(--header-bg); 
            border: 2px solid var(--gold); 
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 15px; 
            box-shadow: var(--shadow); 
        }
        .gold-text { color: var(--gold); text-shadow: 0 0 2px rgba(212, 175, 55, 0.2); }
        
        .sub-count { 
            font-size: 0.85em; 
            background: rgba(212, 175, 55, 0.1); 
            border: 1px solid var(--gold); 
            display: inline-block; 
            padding: 5px 15px; 
            border-radius: 50px; 
            margin-bottom: 15px; 
            color: var(--gold); 
        }
        
        .price-card { 
            background: var(--card); 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: 0.3s;
            box-shadow: var(--shadow);
        }
        .price-card:hover { border-color: var(--gold); transform: scale(1.02); }
        
        .value { font-size: 1.4em; font-weight: 900; color: var(--text); }
        .percent { font-size: 0.8em; font-weight: bold; margin-top: 4px; display: block; }
        
        .alert-box { 
            background: var(--card); 
            border: 2px solid var(--gold); 
            border-radius: 20px; 
            padding: 20px; 
            margin-top: 20px; 
            box-shadow: var(--shadow);
        }
        input { 
            width: 90%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 10px; 
            border: 1px solid var(--gold); 
            background: var(--bg); 
            color: var(--text); 
            text-align: center; 
        }
        
        .btn-alert { 
            background: linear-gradient(to bottom, var(--gold), var(--dark-gold)); 
            color: #fff; 
            border: none; 
            padding: 15px; 
            border-radius: 10px; 
            width: 100%; 
            font-weight: 900; 
            cursor: pointer; 
            font-size: 1.1em; 
        }
        
        .footer-link { margin-top: 20px; display: block; color: var(--gold); text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="theme-switch" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-moon"></i>
    </div>

    <div class="header">
        <h1 class="gold-text" style="margin:0;">GOLD DZ LIVE 💰</h1>
        <p style="font-size: 0.9em; opacity: 0.8;">بورصة الذهب المباشرة - الجزائر</p>
    </div>

    <div class="sub-count">
        <i class="fas fa-users"></i> المشتركون: <span id="userCount">14,920</span> عضو
    </div>

    <div id="prices">
        <div class="price-card">
            <span>عــيار 24</span>
            <div style="text-align: left;">
                <div class="value" id="g24">...</div>
                <span id="p24" class="percent">0.00%</span>
            </div>
        </div>
        <div class="price-card">
            <span>عــيار 21</span>
            <div style="text-align: left;">
                <div class="value" id="g21">...</div>
                <span id="p21" class="percent">0.00%</span>
            </div>
        </div>
        <div class="price-card">
            <span>عــيار 18</span>
            <div style="text-align: left;">
                <div class="value" id="g18">...</div>
                <span id="p18" class="percent">0.00%</span>
            </div>
        </div>
    </div>

    <div class="alert-box">
        <h3 class="gold-text" style="margin:0;">🔔 اشترك في التنبيهات</h3>
        <input type="email" id="userEmail" placeholder="أدخل بريدك الإلكتروني">
        <button class="btn-alert" onclick="subscribe()">تفعيل الإشعارات المباشرة ✅</button>
    </div>

    <a href="https://gold-22k-21k-18k.blogspot.com/" class="footer-link">
        <i class="fas fa-globe"></i> زيارة الموقع الرسمي
    </a>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // وظيفة تبديل الوضع
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                icon.className = 'fas fa-moon';
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-sun';
            }
        }

        function connectBinance() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/paxgusdt@ticker');
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                const price = parseFloat(data.c);
                const percent = parseFloat(data.P);
                const rate = 240; // سعر السكوار المتوقع في 2026
                
                const p24 = (price / 31.1034) * rate;
                updatePrice('24', p24, percent, 1);
                updatePrice('21', p24, percent, 0.875);
                updatePrice('18', p24, percent, 0.75);
            };
        }

        function updatePrice(id, basePrice, percent, factor) {
            const finalPrice = Math.round(basePrice * factor);
            document.getElementById('g' + id).innerText = finalPrice.toLocaleString() + " دج";
            const pElem = document.getElementById('p' + id);
            pElem.innerText = (percent >= 0 ? "+" : "") + percent.toFixed(2) + "%";
            
            // تغيير اللون بناءً على الارتفاع أو الانخفاض
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (percent >= 0) {
                pElem.style.color = isDark ? '#00ff88' : '#008844';
            } else {
                pElem.style.color = isDark ? '#ff4444' : '#cc0000';
            }
        }

        async function subscribe() {
            const email = document.getElementById('userEmail').value;
            if (!email.includes('@')) return alert("البريد غير صحيح");
            
            tg.showConfirm("هل تريد تأكيد الاشتراك في خدمة التنبيهات؟", (ok) => {
                if(ok) {
                    alert("✅ تم تفعيل اشتراكك بنجاح");
                }
            });
        }

        connectBinance();
    </script>
</body>
</html>
