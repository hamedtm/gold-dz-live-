<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLD DZ LIVE - التنبيهات الذكية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --gold: #d4af37; --bg: #ffffff; --text: #1a1a1a; --card: #f9f9f9; --up: #27ae60; --down: #e74c3c; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; text-align: center; }
        .header { background: linear-gradient(135deg, #1a1410, #000); color: var(--gold); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-bottom: 3px solid var(--gold); }
        .price-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(212,175,55,0.2); }
        .value { font-size: 1.3em; font-weight: 900; color: var(--gold); }
        .alert-box { background: var(--card); border: 2px solid var(--gold); border-radius: 15px; padding: 15px; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--gold); box-sizing: border-box; }
        .btn-alert { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1.1em; transition: 0.3s; }
        .btn-alert:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 1.4em;">GOLD DZ LIVE 💰</h1>
        <p style="margin:5px 0; font-size: 0.8em; color:#fff;">أسعار السكوار مباشرة</p>
    </div>

    <div id="prices">
        <div class="price-card">
            <span>عيار 21 (السكوار)</span>
            <div class="value" id="g21">...</div>
        </div>
    </div>

    <div class="alert-box">
        <h3 style="margin:0 0 10px 0;">🔔 تفعيل التنبيهات</h3>
        <input type="email" id="userEmail" placeholder="أدخل بريدك الإلكتروني">
        <button class="btn-alert" id="subBtn" onclick="subscribe()">تفعيل الآن ✅</button>
    </div>

    <script>
        // التحقق من وجود التيليجرام أو استخدام المتصفح العادي
        const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
        if(tg) tg.expand();

        const scriptURL = 'https://script.google.com/macros/s/AKfycbxddd5DSCWtEDCFfg3HNRUfhMkGROes2Mm8NrlJm3zM3Yt-cTPJlblvx4RXimoqFqeF/exec';

        // دالة عرض الرسائل (تعمل في تيليجرام وفي المتصفح)
        function myNotify(msg) {
            if (tg && tg.showAlert) {
                tg.showAlert(msg);
            } else {
                alert(msg);
            }
        }

        function connectBinance() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/paxgusdt@ticker');
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                const price = parseFloat(data.c);
                const p21 = ((price / 31.1034) * 240) * 0.875;
                document.getElementById('g21').innerText = Math.round(p21).toLocaleString() + " دج";
            };
        }

        async function subscribe() {
            const emailInput = document.getElementById('userEmail');
            const btn = document.getElementById('subBtn');
            const email = emailInput.value;

            if (!email || !email.includes('@')) {
                myNotify("⚠️ يرجى إدخال بريد إلكتروني صحيح");
                return;
            }

            btn.innerText = "جاري الحفظ... ⏳";
            btn.disabled = true;

            try {
                // استخدام FormData لضمان وصول البيانات لجوجل سكربت
                let formData = new FormData();
                formData.append('email', email);

                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });

                myNotify("✅ تم الاشتراك بنجاح! ستصلك التنبيهات فور تغير السعر.");
                emailInput.value = "";
            } catch (error) {
                myNotify("❌ فشل الاتصال، تأكد من إعدادات Google Script");
            } finally {
                btn.innerText = "تفعيل الآن ✅";
                btn.disabled = false;
            }
        }

        connectBinance();
    </script>
</body>
</html>
