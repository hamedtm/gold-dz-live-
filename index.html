<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLD DZ LIVE - بوت تيليجرام</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --gold: #d4af37; --bg: #ffffff; --text: #1a1a1a; --card: #f9f9f9; --up: #27ae60; --down: #e74c3c; }
        body.dark-mode { --bg: #0d0d0d; --text: #ffffff; --card: #1a1410; }
        
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; transition: 0.3s; overflow-x: hidden; }
        
        .header { background: linear-gradient(135deg, #1a1410, #000); color: var(--gold); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-bottom: 3px solid var(--gold); }
        
        .price-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(212,175,55,0.2); }
        
        .value { font-size: 1.3em; font-weight: 900; color: var(--gold); }
        .percent { font-size: 0.8em; font-weight: bold; border-radius: 5px; padding: 2px 8px; }
        
        .alert-box { background: var(--card); border: 2px solid var(--gold); border-radius: 15px; padding: 15px; margin-top: 15px; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--gold); background: var(--bg); color: var(--text); font-family: 'Tajawal'; }
        
        .btn-alert { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        
        .visit-blog { margin-top: 20px; display: block; color: var(--gold); text-decoration: none; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body id="mainBody">

    <div class="header">
        <h1 style="font-size: 1.5em; margin: 0;">GOLD DZ LIVE 💰</h1>
        <p style="font-size: 0.8em; color: #fff;">الأسعار المباشرة في الجزائر (السكوار)</p>
    </div>

    <div id="prices">
        <div class="price-card">
            <span>عيار 24</span>
            <div style="text-align: left;">
                <div class="value" id="g24">...</div>
                <span id="p24" class="percent">0.00%</span>
            </div>
        </div>
        <div class="price-card">
            <span>عيار 21</span>
            <div style="text-align: left;">
                <div class="value" id="g21">...</div>
                <span id="p21" class="percent">0.00%</span>
            </div>
        </div>
    </div>

    <div class="alert-box">
        <h3 style="margin-top:0;">🔔 اشترك في التنبيهات</h3>
        <input type="email" id="userEmail" placeholder="أدخل بريدك الإلكتروني">
        <button class="btn-alert" onclick="subscribe()">تفعيل الإشعارات يومياً ✅</button>
    </div>

    <a href="https://gold-22k-21k-18k.blogspot.com/" class="visit-blog" target="_blank">
        <i class="fas fa-external-link-alt"></i> زيارة الموقع الرسمي لمزيد من التفاصيل
    </a>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // تمديد الواجهة لتملأ شاشة التيليجرام

        // رابط السكربت الخاص بك الذي ربطناه بجوجل شيت
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxddd5DSCWtEDCFfg3HNRUfhMkGROes2Mm8NrlJm3zM3Yt-cTPJlblvx4RXimoqFqeF/exec';

        function connectBinance() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/paxgusdt@ticker');
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                const price = parseFloat(data.c);
                const percent = parseFloat(data.P);
                const rate = 240; // سعر الدولار في السكوار
                
                const p24 = (price / 31.1034) * rate;
                const p21 = p24 * (21/24);

                document.getElementById('g24').innerText = Math.round(p24).toLocaleString() + " دج";
                document.getElementById('g21').innerText = Math.round(p21).toLocaleString() + " دج";
                
                const pElem = document.getElementById('p24');
                pElem.innerText = (percent >= 0 ? "+" : "") + percent + "%";
                pElem.style.color = percent >= 0 ? '#27ae60' : '#e74c3c';
            };
        }

        async function subscribe() {
            const email = document.getElementById('userEmail').value;
            if (!email.includes('@')) {
                tg.showAlert("يرجى إدخال بريد إلكتروني صحيح!");
                return;
            }

            tg.MainButton.setText("جاري الحفظ...").show();

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: new URLSearchParams({'email': email})
            }).then(() => {
                tg.MainButton.hide();
                tg.showConfirm("تم الاشتراك بنجاح! ستصلك الأسعار على بريدك.");
                document.getElementById('userEmail').value = "";
            }).catch(() => {
                tg.showAlert("حدث خطأ، حاول مجدداً.");
                tg.MainButton.hide();
            });
        }

        connectBinance();
    </script>
</body>
</html>
