<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLD DZ LIVE - حاسبة الزكاة الدقيقة</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #b8860b; --dark-gold: #8b6508; --bg: #f4f4f4; --card: #ffffff; --text: #333333; --up: #008844; --down: #cc0000; --shadow: 0 4px 15px rgba(0,0,0,0.1); }
        [data-theme="dark"] { --gold: #ffd700; --dark-gold: #b8860b; --bg: #0a0a0a; --card: #161616; --text: #ffffff; --up: #00ff88; --down: #ff4444; --shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; text-align: center; transition: 0.3s; padding-bottom: 50px;}
        .theme-switch { position: fixed; top: 15px; left: 15px; z-index: 1000; background: var(--card); border: 1px solid var(--gold); padding: 10px; border-radius: 50%; cursor: pointer; color: var(--gold); }
        .header { background: var(--card); border: 2px solid var(--gold); padding: 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: var(--shadow); }
        .gold-text { color: var(--gold); }
        .price-card { background: var(--card); border: 1px solid rgba(212, 175, 55, 0.3); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); }
        .value { font-size: 1.4em; font-weight: 900; }
        
        .box { background: var(--card); border: 2px solid var(--gold); border-radius: 20px; padding: 20px; margin-top: 20px; box-shadow: var(--shadow); }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--gold); background: var(--bg); color: var(--text); text-align: center; font-family: 'Tajawal'; font-weight: bold; }
        
        .btn-gold { background: linear-gradient(to bottom, var(--gold), var(--dark-gold)); color: #fff; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: 900; cursor: pointer; }
        .nisab-info { font-size: 0.85em; margin: 10px 0; color: var(--gold); line-height: 1.6; }
        .zaket-result { background: rgba(0, 255, 136, 0.1); padding: 15px; border-radius: 10px; border: 1px dashed var(--up); margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="theme-switch" onclick="toggleTheme()"><i id="theme-icon" class="fas fa-moon"></i></div>

    <div class="header">
        <h1 class="gold-text" style="margin:0;">GOLD DZ LIVE 💰</h1>
        <p style="font-size: 0.8em; opacity: 0.8;">تطبيق حساب الزكاة والأسعار المباشرة</p>
    </div>

    <div id="prices">
        <div class="price-card"><span>عــيار 24</span><div class="value" id="g24">...</div></div>
        <div class="price-card"><span>عــيار 21</span><div class="value" id="g21">...</div></div>
        <div class="price-card"><span>عــيار 18</span><div class="value" id="g18">...</div></div>
    </div>

    <div class="box">
        <h3 class="gold-text" style="margin:0;"><i class="fas fa-balance-scale"></i> حاسبة الزكاة الشرعية</h3>
        <div class="nisab-info">
            النصاب المعتمد: 85 غرام ذهب خالص (عيار 24)<br>
            قيمة النصاب اليوم بالدينار: <span id="nisabValue">يتم الحساب...</span>
        </div>

        <select id="goldCarat">
            <option value="24">ذهب عيار 24 (خالص)</option>
            <option value="21">ذهب عيار 21 (سكوار)</option>
            <option value="18">ذهب عيار 18 (محلي)</option>
        </select>

        <input type="number" id="goldWeight" placeholder="أدخل وزن الذهب بالغرام">
        
        <button class="btn-gold" onclick="calculateZakat()">احسب مقدار الزكاة ⚖️</button>
        
        <div id="zakatArea" class="zaket-result">
            <div id="zakatStatus" style="font-weight: bold; margin-bottom: 5px;"></div>
            <div style="font-size: 0.9em;">قيمة الزكاة (2.5%):</div>
            <div id="zakatFinal" style="font-size: 1.6em; font-weight: 900; color: var(--up);">0 دج</div>
            <div id="pureWeightDetail" style="font-size: 0.75em; margin-top: 8px; opacity: 0.8;"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let currentPrice24 = 0;

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                icon.className = 'fas fa-moon';
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-sun';
            }
        }

        function connectBinance() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/paxgusdt@ticker');
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                const price = parseFloat(data.c);
                const rate = 240; // سعر الصرف المتوقع
                currentPrice24 = (price / 31.1034) * rate;
                
                document.getElementById('g24').innerText = Math.round(currentPrice24).toLocaleString() + " دج";
                document.getElementById('g21').innerText = Math.round(currentPrice24 * 0.875).toLocaleString() + " دج";
                document.getElementById('g18').innerText = Math.round(currentPrice24 * 0.75).toLocaleString() + " دج";
                
                const nisab = Math.round(currentPrice24 * 85);
                document.getElementById('nisabValue').innerText = nisab.toLocaleString() + " دج";
            };
        }

        function calculateZakat() {
            const weight = parseFloat(document.getElementById('goldWeight').value);
            const carat = parseInt(document.getElementById('goldCarat').value);
            const resArea = document.getElementById('zakatArea');
            const status = document.getElementById('zakatStatus');
            
            if (!weight || weight <= 0) {
                alert("يرجى إدخال وزن صحيح");
                return;
            }

            // المعادلة الشرعية: تحويل الوزن إلى عيار 24
            const pureWeight = (weight * carat) / 24;

            if (pureWeight < 85) {
                status.innerText = "⚠️ لم يبلغ النصاب الشرعي";
                status.style.color = "var(--down)";
                document.getElementById('zakatFinal').innerText = "0 دج";
                document.getElementById('pureWeightDetail').innerText = `وزن الذهب الخالص في مالك: ${pureWeight.toFixed(2)}غ (أقل من 85غ)`;
            } else {
                status.innerText = "✅ وجبت فيها الزكاة";
                status.style.color = "var(--up)";
                const totalValue = pureWeight * currentPrice24;
                const zakatAmount = totalValue * 0.025;
                document.getElementById('zakatFinal').innerText = Math.round(zakatAmount).toLocaleString() + " دج";
                document.getElementById('pureWeightDetail').innerText = `وزن الذهب الخالص: ${pureWeight.toFixed(2)} غرام`;
            }
            resArea.style.display = "block";
        }

        connectBinance();
    </script>
</body>
</html>
